<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ramadan Persona AI 🌙</title>
  <script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #312e81 100%); min-height: 100vh; color: white; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .page { display: none; } .page.active { display: flex; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="overflow-x-hidden selection:bg-purple-500">

  <div id="page-entry" class="page active flex-col items-center justify-center min-h-screen px-4 py-8">
    <div class="max-w-md w-full text-center">
      <div class="text-6xl mb-4 animate-bounce">🌙</div>
      <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-200 mb-8">Ramadan Persona</h1>
      
      <div class="glass rounded-3xl p-6 mb-6 text-left shadow-2xl">
        <label class="block text-sm font-semibold mb-2 text-emerald-200">Siapa nama kamu?</label>
        <input type="text" id="input-name" placeholder="Ketik nama panggilan..." class="w-full bg-slate-900/50 rounded-xl px-4 py-3 outline-none border border-slate-600 focus:border-emerald-400 transition-all" />
      </div>

      <div class="glass rounded-3xl p-6 mb-8 text-left shadow-2xl">
        <label class="block text-sm font-semibold mb-3 text-emerald-200">Pilih Vibes Persona 🎭</label>
        <div class="grid grid-cols-2 gap-4">
          <div class="tone-card glass rounded-xl p-4 text-center cursor-pointer border-2 border-transparent transition-all" data-tone="receh" onclick="selectTone('receh')">
            <div class="text-3xl mb-2">😂</div><div class="font-bold">Receh Gen-Z</div>
          </div>
          <div class="tone-card glass rounded-xl p-4 text-center cursor-pointer border-2 border-transparent transition-all" data-tone="serius" onclick="selectTone('serius')">
            <div class="text-3xl mb-2">🧠</div><div class="font-bold">Kalem & Bijak</div>
          </div>
        </div>
      </div>

      <button id="btn-start" onclick="startQuiz()" disabled class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 py-4 rounded-2xl font-bold text-lg shadow-lg opacity-50 cursor-not-allowed transition-all hover:scale-105">Mulai Analisis AI 🚀</button>
    </div>
  </div>

  <div id="page-quiz" class="page flex-col items-center min-h-screen px-4 py-12">
    <div class="max-w-md w-full">
      <div class="flex justify-between text-sm mb-3 font-semibold text-emerald-200">
        <span>Soal <span id="quiz-current">1</span>/5</span>
        <span id="quiz-player-name" class="uppercase tracking-wider"></span>
      </div>
      <div class="w-full bg-slate-800 h-2 rounded-full mb-8 overflow-hidden">
        <div id="quiz-progress" class="h-full bg-gradient-to-r from-emerald-400 to-teal-400 transition-all duration-500" style="width: 0%"></div>
      </div>

      <div id="quiz-loading" class="text-center py-20 flex flex-col items-center">
        <div class="w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-emerald-200 font-medium">Qwen AI sedang meracik soal...</p>
      </div>

      <div id="quiz-content" class="hidden">
        <div class="glass p-6 rounded-3xl mb-6 shadow-xl border-emerald-500/30 border">
          <p id="quiz-question" class="text-xl font-bold leading-relaxed"></p>
        </div>
        <div id="quiz-options" class="space-y-3 mb-8"></div>
        <button id="btn-next" onclick="nextQuestion()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold hidden transition-all shadow-lg">Lanjut ➡️</button>
      </div>
    </div>
  </div>

  <div id="page-result" class="page flex-col items-center min-h-screen px-4 py-12">
    <div class="max-w-md w-full text-center">
      <div id="result-loading" class="py-20 flex flex-col items-center hidden">
        <div class="text-6xl animate-bounce mb-4">🔮</div>
        <p class="text-emerald-200 font-medium text-lg">Menganalisis jawabanmu...</p>
      </div>

      <div id="result-content" class="hidden w-full">
        
        <div id="capture-area" class="p-4 bg-slate-900 rounded-3xl mb-4">
          <div class="glass rounded-3xl p-8 mb-6 relative overflow-hidden shadow-2xl border-emerald-500/50 border-2">
            <div class="absolute top-0 right-0 p-4 text-emerald-300 font-bold bg-slate-800/50 rounded-bl-2xl">Skor: <span id="res-score"></span>/5</div>
            <div class="text-7xl mb-8" id="res-emoji"></div>
            <p class="text-sm font-semibold text-emerald-200 uppercase tracking-widest mb-1" id="res-player"></p>
            <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-200 mb-4" id="res-persona"></h2>
            <p id="res-desc" class="text-slate-300 mb-6 italic text-sm"></p>
            
            <div class="grid grid-cols-2 gap-3 text-left text-xs mb-4">
              <div class="bg-slate-800/80 p-3 rounded-xl border border-slate-600"><span class="block text-emerald-400 font-bold mb-1">⚡ Superpower</span><span id="res-super"></span></div>
              <div class="bg-slate-800/80 p-3 rounded-xl border border-slate-600"><span class="block text-rose-400 font-bold mb-1">📉 Weakness</span><span id="res-weak"></span></div>
            </div>
            <div class="bg-emerald-900/40 p-3 rounded-xl border border-emerald-500/30 text-left text-xs mb-4">
              <span class="block text-emerald-300 font-bold mb-1">💡 Advice</span><span id="res-advice" class="text-slate-200"></span>
            </div>
          </div>

          <div class="glass rounded-3xl p-6 mb-2 text-left border border-slate-600">
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Tebak-tebakan AI 🤖</div>
            <p id="res-meme-setup" class="text-emerald-200 font-semibold mb-2"></p>
            <p id="res-meme-punch" class="text-xl font-extrabold"></p>
          </div>
          
          <p class="text-center text-[10px] text-slate-500 mt-2 font-bold tracking-widest">BUAT PERSONAMU DI: 8.215.95.232</p>
        </div>
        <button onclick="downloadStory()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-400 hover:to-pink-400 text-white py-4 rounded-2xl font-bold mb-3 flex items-center justify-center gap-2 transition-all shadow-lg">
          📸 Download for IG/WA Story
        </button>
        <button onclick="shareWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#20b858] text-white py-4 rounded-2xl font-bold mb-3 flex items-center justify-center gap-2 transition-all">
          Pamer ke WhatsApp
        </button>
        <button onclick="window.location.reload()" class="w-full bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold transition-all border border-slate-600">Main Lagi 🔄</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
